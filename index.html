<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Registration</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .form-container { background: white; max-width: 400px; margin: 0 auto; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #06C755; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        #statusMessage { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-container">
    <h2 style="text-align: center; color: #333;">ลงทะเบียนผู้ติดต่อ</h2>
    <form id="regForm">
        <div class="form-group">
            <label>ชื่อ-นามสกุล</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label>วันที่เข้าพบ</label>
            <input type="date" id="date" required>
        </div>
        <div class="form-group">
            <label>เวลาเริ่ม</label>
            <input type="time" id="startTime" required>
        </div>
        <div class="form-group">
            <label>เวลาสิ้นสุด</label>
            <input type="time" id="endTime" required>
        </div>
        <button type="submit" id="submitBtn">ยืนยันการลงทะเบียน</button>
    </form>
    <div id="statusMessage"></div>
</div>

<script>
    const LIFF_ID = '2010679197-vXl137uD';
    
    // 🎯 ตั้งค่าข้อมูล GitHub ของพี่ตรงนี้:
    const OWNER = 'takdanai2903'; 
    const REPO = 'register_log.csv'; 
    const TOKEN = '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'; 

    let userUid = '';

    async function main() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                userUid = profile.userId;
            }
        } catch (error) {
            console.error('LIFF Init Error:', error);
        }
    }

    document.getElementById('regForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!userUid) {
            alert('ไม่สามารถดึงข้อมูล LINE UID ได้');
            return;
        }

        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');
        submitBtn.disabled = true;
        statusMessage.style.color = '#007bff';
        statusMessage.innerText = 'กำลังส่งข้อมูลเข้าสู่ระบบ GitHub...';

        const payload = {
            event_type: "registration_event",
            client_payload: {
                uid: userUid,
                name: document.getElementById('name').value,
                date: document.getElementById('date').value,
                start: document.getElementById('startTime').value,
                end: document.getElementById('endTime').value
            }
        };

        try {
            const url = `https://api.github.com/repos/${OWNER}/${REPO}/dispatches`;
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Accept': 'application/vnd.github+json',
                    'Authorization': `Bearer ${TOKEN}`,
                    'X-GitHub-Api-Version': '2022-11-28'
                },
                body: JSON.stringify(payload)
            });

            if (response.status === 204) {
                statusMessage.style.color = '#06C755';
                statusMessage.innerText = 'ลงทะเบียนสำเร็จ! ระบบ Node.js กำลังบันทึกไฟล์และส่งข้อความเข้า LINE ของคุณ';
                document.getElementById('regForm').reset();
                setTimeout(() => { liff.closeWindow(); }, 3000);
            } else {
                statusMessage.style.color = 'red';
                statusMessage.innerText = 'เกิดข้อผิดพลาดรหัส: ' + response.status;
                submitBtn.disabled = false;
            }
        } catch (error) {
            statusMessage.style.color = 'red';
            statusMessage.innerText = 'การเชื่อมต่อขัดข้อง กรุณาลองใหม่';
            submitBtn.disabled = false;
        }
    });

    main();
</script>
</body>
</html>
