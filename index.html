<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Registration</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .form-container { background: white; max-width: 400px; margin: 0 auto; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #06C755; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        #statusMessage { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-container">
    <h2 style="text-align: center; color: #333;">ลงทะเบียนผู้ติดต่อ</h2>
    <form id="regForm">
        <div class="form-group">
            <label>ชื่อ-นามสกุล</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label>วันที่เข้าพบ</label>
            <input type="date" id="date" required>
        </div>
        <div class="form-group">
            <label>เวลาเริ่ม</label>
            <input type="time" id="startTime" required>
        </div>
        <div class="form-group">
            <label>เวลาสิ้นสุด</label>
            <input type="time" id="endTime" required>
        </div>
        <button type="submit" id="submitBtn">ยืนยันการลงทะเบียน</button>
    </form>
    <div id="statusMessage"></div>
</div>

<script>
    const LIFF_ID = '2010679197-vXl137uD';
    // 🔗 ย้ายเข้ามาอยู่ในสคริปต์ และต่อท้ายด้วย /api/register เรียบร้อยครับพี่
    const BACKEND_URL = 'https://register-log-csv.vercel.app/api/register';

    let userUid = '';

    async function main() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                userUid = profile.userId;
            }
        } catch (error) {
            console.error('LIFF Init Error:', error);
        }
    }

    document.getElementById('regForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!userUid) {
            alert('ไม่สามารถดึงข้อมูล LINE UID ได้');
            return;
        }

        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');
        submitBtn.disabled = true;
        statusMessage.style.color = '#007bff';
        statusMessage.innerText = 'กำลังส่งข้อมูลให้ Line OA ประมวลผล...';

        // แพ็คข้อมูลส่งไปให้ Node.js หลังบ้านบน Vercel ทำงานแทน
        const payload = {
            uid: userUid,
            name: document.getElementById('name').value,
            date: document.getElementById('date').value,
            start: document.getElementById('startTime').value,
            end: document.getElementById('endTime').value
        };

        try {
            // ยิงเป้าหมายไปที่ Vercel หลังบ้าน
            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                statusMessage.style.color = '#06C755';
                statusMessage.innerText = 'ลงทะเบียนสำเร็จ! ข้อความถูกส่งผ่าน Line OA แล้ว';
                document.getElementById('regForm').reset();
                setTimeout(() => { liff.closeWindow(); }, 2500);
            } else {
                statusMessage.style.color = 'red';
                statusMessage.innerText = 'ระบบหลังบ้านขัดข้อง กรุณาลองใหม่';
                submitBtn.disabled = false;
            }
        } catch (error) {
            console.error(error);
            statusMessage.style.color = 'red';
            statusMessage.innerText = 'การเชื่อมต่อมีปัญหา กรุณาลองใหม่';
            submitBtn.disabled = false;
        }
    });

    main();
</script>
</body>
</html>
