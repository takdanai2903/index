<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Registration</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .form-container { background: white; max-width: 400px; margin: 0 auto; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #06C755; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        #statusMessage { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-container">
    <h2 style="text-align: center; color: #333;">ลงทะเบียนผู้ติดต่อ</h2>
    <form id="regForm">
        <div class="form-group">
            <label>ชื่อ-นามสกุล</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label>วันที่เข้าพบ</label>
            <input type="date" id="date" required>
        </div>
        <div class="form-group">
            <label>เวลาเริ่ม</label>
            <input type="time" id="startTime" required>
        </div>
        <div class="form-group">
            <label>เวลาสิ้นสุด</label>
            <input type="time" id="endTime" required>
        </div>
        <button type="submit" id="submitBtn">ยืนยันการลงทะเบียน</button>
    </form>
    <div id="statusMessage"></div>
</div>

<script>
    const LIFF_ID = '2010679197-vXl137uD';
    
    // 🎯 วางลิงก์ SheetDB ที่ได้จากสเต็ปที่ 1 ตรงนี้ครับ:
    const SHEETDB_API_URL = 'https://sheetdb.io/api/v1/630xkz61217fs'; 

    const LINE_TOKEN = 'ak4rGcQnj8q+VTaXJQY+ISjEr76h5PPJfiaTa8KzXpgRjpxZB+QKivbLI2tgHD22wGH9yP86Uiis7y5azIZAejwsMVBmwUrfjpp+JzgRx9wQDuD2XX/mj1ERi/H7sbqna2aQorAX+h2jlpHnmInCGQdB04t89/1O/w1cDnyilFU=';
    let userUid = '';

    async function main() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                userUid = profile.userId;
            }
        } catch (error) {
            console.error('LIFF Init Error:', error);
        }
    }

    document.getElementById('regForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!userUid) {
            alert('ไม่สามารถดึงข้อมูล LINE UID ได้');
            return;
        }

        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');
        submitBtn.disabled = true;
        statusMessage.style.color = '#007bff';
        statusMessage.innerText = 'กำลังบันทึกข้อมูลและส่ง LINE...';

        const name = document.getElementById('name').value;
        const date = document.getElementById('date').value;
        const start = document.getElementById('startTime').value;
        const end = document.getElementById('endTime').value;
        const timestamp = new Date().toLocaleString('th-TH');

        // 🌟 1. ตรรกะบันทึกข้อมูลลง Google Sheet (ทำแทน Apps Script โดยตรงจากหน้าบ้าน)
        const sheetPayload = {
            data: [
                {
                    "Timestamp": timestamp,
                    "Line_UID": userUid,
                    "Name": name,
                    "Date": date,
                    "Start_Time": start,
                    "End_Time": end
                }
            ]
        };

        // 🌟 2. ตรรกะยิงหา LINE API + เจน QR Code (ทำแทน Apps Script)
        const qrRawData = `${name}|${date}|${start}|${end}`;
        const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(qrRawData)}`;
        
        const linePayload = {
            "to": userUid,
            "messages": [
                {
                    "type": "text",
                    "text": `✨ ลงทะเบียนเข้าพบสำเร็จ!\n👤 ผู้ติดต่อ: ${name}\n📅 วันที่: ${date}\n⏰ เวลา: ${start} - ${end} น.\n\nโปรดใช้ QR Code ด้านล่างนี้ในการสแกนเข้า-ออกพื้นที่ครับ`
                },
                {
                    "type": "image",
                    "originalContentUrl": qrImageUrl,
                    "previewImageUrl": qrImageUrl
                }
            ]
        };

        try {
            // ส่งข้อมูลเข้า Google Sheet ผ่าน SheetDB
            const sheetRes = await fetch(SHEETDB_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(sheetPayload)
            });

            // ส่งข้อความเข้า LINE OA ตัวจริง
            const lineRes = await fetch('https://api.line.me/v2/bot/message/push', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${LINE_TOKEN}`
                },
                body: JSON.stringify(linePayload)
            });

            if (sheetRes.ok) {
                statusMessage.style.color = '#06C755';
                statusMessage.innerText = 'ลงทะเบียนสำเร็จเรียบร้อยแล้วครับ!';
                document.getElementById('regForm').reset();
                setTimeout(() => { liff.closeWindow(); }, 3000);
            } else {
                statusMessage.style.color = 'red';
                statusMessage.innerText = 'บันทึกข้อมูลเข้าชีตไม่สำเร็จ';
                submitBtn.disabled = false;
            }
        } catch (error) {
            statusMessage.style.color = 'red';
            statusMessage.innerText = 'เกิดข้อผิดพลาดในการเชื่อมต่อ';
            submitBtn.disabled = false;
        }
    });

    main();
</script>
</body>
</html>
